<svg width="160" height="120" viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoCardsTitle logoCardsDesc">
  <title id="logoCardsTitle">TaroVerse cards logo</title>
  <desc id="logoCardsDesc">Three stylized tarot cards fanned inside a circular badge representing TaroVerse's card-based readings.</desc>
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e4ff" />
      <stop offset="100%" stop-color="#d8b1ff" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1730" />
      <stop offset="100%" stop-color="#261a45" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.32" />
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <rect x="8" y="8" width="144" height="104" rx="52" fill="url(#badgeGrad)" />
  </g>

  <!-- Outer ring -->
  <circle cx="80" cy="60" r="56" stroke="#e9d5b3" stroke-width="3" fill="none" opacity="0.12" />

  <!-- Cards (fanned) -->
  <g transform="translate(80,60)">
    <g transform="rotate(-14) translate(-44,-34)">
      <rect x="0" y="0" width="44" height="66" rx="6" fill="white" opacity="0.06" stroke="#f3d1ff" stroke-width="1.5" />
      <rect x="6" y="6" width="32" height="54" rx="4" fill="url(#cardGrad)" opacity="0.98" />
      <g transform="translate(10,12)">
        <rect x="0" y="0" width="12" height="20" rx="2" fill="#fff" opacity="0.14" />
      </g>
    </g>

    <g transform="rotate(0) translate(-22,-40)">
      <rect x="0" y="0" width="44" height="66" rx="6" fill="white" opacity="0.06" stroke="#f3d1ff" stroke-width="1.5" />
      <rect x="6" y="6" width="32" height="54" rx="4" fill="url(#cardGrad)" opacity="0.95" />
      <g transform="translate(10,10)">
        <path d="M6 0 L10 8 L2 8 Z" fill="#8a5fd4" opacity="0.9" />
      </g>
    </g>

    <g transform="rotate(16) translate(0,-34)">
      <rect x="0" y="0" width="44" height="66" rx="6" fill="white" opacity="0.06" stroke="#f3d1ff" stroke-width="1.5" />
      <rect x="6" y="6" width="32" height="54" rx="4" fill="url(#cardGrad)" opacity="0.92" />
      <g transform="translate(8,12)">
        <circle cx="8" cy="8" r="6" fill="#fff" opacity="0.14" />
      </g>
    </g>

  </g>

  <!-- Center spark / seed -->
  <circle cx="80" cy="60" r="3.6" fill="#fff" opacity="0.95" />
  <circle cx="80" cy="60" r="1.6" fill="#8a5fd4" />

</svg>
